<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM Education - Tương lai của Công nghệ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
 <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <a href="#"><img src="logosteamtim.webp" alt="STEAM Logo" height="40"></a>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#hero">Trang chủ</a></li>
                    <li><a href="#course">Hoạt động</a></li>
                    <li><a href="#testimonial">Đánh giá</a></li>
                </ul>
            </nav>
            <a href="#form" class="btn-cta">Ghi danh ngay</a>
        </div>
    </header>
   <section id="mission" class="mission">
        <div class="container text-center">
            <h2 class="mission-text">Mang giáo dục STEAM <span>miễn phí</span>,<br>chất lượng quốc tế tới cho hơn 20 triệu trẻ em<br>Việt Nam</h2>
            <div class="steam-versions">
                <div class="version-box version-1">
                    <p class="v-title">STEAM 1.0</p>
                    <p class="v-desc">Computer Science + Robotics</p>
                    <div class="v-icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/2172/2172886.png" width="40" alt="Icon" style="filter: invert(1);">
                    </div>
                </div>
                <div class="version-box version-2">
                    <p class="v-title">STEAM 2.0</p>
                    <p class="v-desc">AI Education</p>
                    <div class="v-icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/2082/2082535.png" width="40" alt="Icon" style="filter: invert(1);">
                    </div>
                </div>
                <div class="version-box version-3">
                    <p class="v-title">STEAM 3.0</p>
                    <p class="v-desc">Global Network</p>
                    <div class="v-icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/3214/3214066.png" width="40" alt="Icon" style="filter: invert(1);">
                    </div>
                </div>
            </div>
        </div>
    </section>
